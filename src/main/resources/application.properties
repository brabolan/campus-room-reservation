spring.application.name=project1

# SQLite file location (relative to project root)
spring.datasource.url=jdbc:sqlite:./data/room-reservation.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate dialect for SQLite (from hibernate-community-dialects)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Schema behavior (pick one)
spring.jpa.hibernate.ddl-auto=update

# Helpful logging while developing (optional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Render port configuration
server.port=${PORT:8080}