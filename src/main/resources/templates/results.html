<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Results</title>
    <meta charset="UTF-8"/>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .navbar {
            background: #1e3a8a;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            font-size: 22px;
        }

        .logout-form {
            margin: 0;
        }

        .logout-btn {
            background: white;
            color: #1e3a8a;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #e5e7eb;
        }

        .page-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 32px;
            color: #111827;
        }

        .back-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 24px;
        }

        .time-window {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 15px;
            color: #374151;
        }

        .time-pill {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state h3 {
            margin-top: 0;
            color: #374151;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        thead {
            background: #eff6ff;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-size: 14px;
            color: #1e3a8a;
            border-bottom: 1px solid #dbeafe;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        .room-pill {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .capacity-pill {
            display: inline-block;
            background: #ecfdf5;
            color: #047857;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .amenity-tag {
            display: inline-block;
            background: #f3f4f6;
            color: #374151;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .reserve-form {
            margin: 0;
        }

        .reserve-btn {
            background: #16a34a;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .reserve-btn:hover {
            background: #15803d;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            background: white;
            color: #1e3a8a;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-btn:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h2>Campus Room Reservation</h2>
    <div class="nav-buttons">

        <a th:href="@{/dashboard}" class="nav-btn">Dashboard</a>

        <a th:href="@{/search}" class="nav-btn">Back to Search</a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>

    </div>
</div>

<div class="page-container">

    <div class="page-header">
        <h1>Available Rooms</h1>
        <a th:href="@{/search}" class="back-btn">Back to Search</a>
    </div>

    <div class="card">
        <div class="time-window">
            <strong>Selected Time Window:</strong>
            <span class="time-pill" th:text="${start}">Start</span>
            <span>to</span>
            <span class="time-pill" th:text="${end}">End</span>
        </div>
    </div>

    <div class="card" th:if="${#lists.isEmpty(results)}">
        <div class="empty-state">
            <h3>No available rooms found</h3>
            <p>No rooms match the selected building, filters, and time range.</p>
        </div>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(results)}">
        <table>
            <thead>
                <tr>
                    <th>Building</th>
                    <th>Room</th>
                    <th>Capacity</th>
                    <th>Amenities</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="room : ${results}">
                    <td th:text="${room.building.name}">Building Name</td>
                    <td>
                        <span class="room-pill" th:text="${room.roomNumber}">101</span>
                    </td>
                    <td>
                        <span class="capacity-pill" th:text="${room.capacity}">10</span>
                    </td>
                    <td>
                        <span th:if="${room.amenities == null || #lists.isEmpty(room.amenities)}">None</span>

                        <span th:each="a : ${room.amenities}">
                            <span class="amenity-tag" th:text="${a.name}">AMENITY</span>
                        </span>
                    </td>
                    <td>
                        <form th:action="@{/reservations/book}" method="post" class="reserve-form">
                            <input type="hidden" name="roomId" th:value="${room.id}"/>
                            <input type="hidden" name="start" th:value="${start}"/>
                            <input type="hidden" name="end" th:value="${end}"/>
                            <button type="submit" class="reserve-btn">Reserve</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
